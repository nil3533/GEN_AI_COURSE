spring:
  application:
    name: m04-tool-calling-assistant
  ai:
    model:
      audio:
        speech: none
        transcription: none
      chat: none
      embedding: none
      image: none
      moderation: none

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  ai:
    active-provider: groq
    max-tool-calls: 5
    providers:
      groq:
        enabled: false
        type: openai-compatible
        base-url: https://api.groq.com/openai
        api-key: ${GROQ_API_KEY:}
        model: ${GROQ_MODEL:llama-3.3-70b-versatile}
        temperature: 0.1
        max-tokens: 1000
      ollama:
        enabled: false
        type: ollama
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        model: ${OLLAMA_MODEL:llama3.2:3b}
        temperature: 0.1
        max-tokens: 1000
