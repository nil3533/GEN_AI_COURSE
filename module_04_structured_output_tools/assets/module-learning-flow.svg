<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">Module 4 learning flow</title>
  <desc id="desc">Module 4 moves from structured output to validation, then tool calling, safety, traces, and an order assistant mini-project.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 16px Segoe UI, Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .tool { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .safe { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 10; }
      .h { font: 700 18px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .t { font: 500 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="540"/>
  <text x="56" y="70" class="title">Module 4: Structured Output and Tools</text>
  <text x="58" y="102" class="sub">Typed model output, backend tool calls, safety checks, and traceable assistant responses.</text>

  <rect x="58" y="150" width="220" height="92" class="box"/>
  <text x="82" y="186" class="h">Typed Output</text>
  <text x="82" y="212" class="t">Java records</text>
  <text x="82" y="232" class="t">No regex parsing</text>

  <path d="M280 196 H342" class="arrow"/>

  <rect x="352" y="150" width="220" height="92" class="box"/>
  <text x="376" y="186" class="h">Schema Prompt</text>
  <text x="376" y="212" class="t">BeanOutputConverter</text>
  <text x="376" y="232" class="t">Parse model JSON</text>

  <path d="M574 196 H636" class="arrow"/>

  <rect x="646" y="150" width="220" height="92" class="warn"/>
  <text x="670" y="186" class="h">Validation</text>
  <text x="670" y="212" class="t">Jakarta constraints</text>
  <text x="670" y="232" class="t">Retry or fail clearly</text>

  <path d="M756 244 V304" class="arrow"/>

  <rect x="646" y="314" width="220" height="92" class="tool"/>
  <text x="670" y="350" class="h">Tool Calling</text>
  <text x="670" y="376" class="t">@Tool methods</text>
  <text x="670" y="396" class="t">Backend services</text>

  <path d="M644 360 H582" class="arrow"/>

  <rect x="352" y="314" width="220" height="92" class="safe"/>
  <text x="376" y="350" class="h">Safety Guards</text>
  <text x="376" y="376" class="t">Budgets and confirms</text>
  <text x="376" y="396" class="t">Trace every call</text>

  <path d="M350 360 H288" class="arrow"/>

  <rect x="58" y="314" width="220" height="92" class="safe"/>
  <text x="82" y="350" class="h">Assistant API</text>
  <text x="82" y="376" class="t">Order status</text>
  <text x="82" y="396" class="t">Recent orders, cancel</text>

  <rect x="920" y="230" width="142" height="116" class="tool"/>
  <text x="946" y="270" class="h">Mini</text>
  <text x="940" y="296" class="h">Project</text>
  <text x="944" y="326" class="t">Order assistant</text>
  <path d="M868 196 C914 206 922 230 922 250" class="arrow"/>
  <path d="M868 360 C914 350 922 326 922 306" class="arrow"/>
</svg>
