spring:
  application:
    name: m02-multi-provider-chat
  ai:
    model:
      audio:
        speech: none
        transcription: none
      chat: none
      embedding: none
      image: none
      moderation: none

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  ai:
    active-provider: ollama
    system-prompt: >
      You are a practical Spring Boot and GenAI assistant.
      Answer clearly, keep examples Java-focused, and say when information is uncertain.
    providers:
      ollama:
        enabled: true
        type: ollama
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        model: ${OLLAMA_MODEL:llama3.2:3b}
        temperature: 0.2
        max-tokens: 800
      groq:
        enabled: false
        type: openai-compatible
        base-url: https://api.groq.com/openai
        api-key: ${GROQ_API_KEY:}
        model: ${GROQ_MODEL:llama-3.3-70b-versatile}
        temperature: 0.3
        max-tokens: 800
