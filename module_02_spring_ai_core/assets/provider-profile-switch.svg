<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="520" viewBox="0 0 1150 520" role="img" aria-labelledby="title desc">
  <title id="title">Provider switching with Spring profiles</title>
  <desc id="desc">One application binary selects provider configuration through Spring profiles for Groq or Ollama.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1150" height="520" rx="22" fill="#f8fafc"/>
  <text x="60" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">One Codebase, Many Providers</text>
  <text x="60" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">The service depends on ChatClient. Spring profiles decide which provider bean and properties are active.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="214" width="230" height="100" rx="16" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="185" y="254" text-anchor="middle" font-size="20" font-weight="700" fill="#075985">Spring Boot app</text>
    <text x="185" y="282" text-anchor="middle" font-size="16" fill="#0f172a">no provider if/else</text>
    <rect x="410" y="214" width="230" height="100" rx="16" fill="#dcfce7" stroke="#16a34a"/>
    <text x="525" y="254" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">Active profile</text>
    <text x="525" y="282" text-anchor="middle" font-size="16" fill="#0f172a">groq / ollama</text>
    <rect x="760" y="128" width="260" height="62" rx="14" fill="#fef3c7" stroke="#d97706"/>
    <text x="890" y="166" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">application-groq.yml</text>
    <rect x="760" y="220" width="260" height="62" rx="14" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="890" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">application-ollama.yml</text>
    <rect x="760" y="312" width="260" height="62" rx="14" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="890" y="350" text-anchor="middle" font-size="18" font-weight="700" fill="#115e59">application-compare.yml</text>
    <line x1="300" y1="264" x2="408" y2="264" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="640" y1="264" x2="758" y2="159" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="640" y1="264" x2="758" y2="251" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="640" y1="264" x2="758" y2="343" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
