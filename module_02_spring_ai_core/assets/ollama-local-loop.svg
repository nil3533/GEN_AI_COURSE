<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Ollama local development loop</title>
  <desc id="desc">A Spring Boot app calls Spring AI Ollama ChatModel, which calls local Ollama and a local model, then returns a response without a hosted API.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1120" height="500" rx="22" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">Local LLM Loop with Ollama</text>
  <text x="60" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Useful for offline demos, private experiments, and cost-free development on small models.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="80" y="190" width="190" height="100" rx="16" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="175" y="230" text-anchor="middle" font-size="20" font-weight="700" fill="#075985">Spring Boot</text>
    <text x="175" y="258" text-anchor="middle" font-size="16" fill="#0f172a">ChatClient</text>
    <rect x="350" y="190" width="210" height="100" rx="16" fill="#dcfce7" stroke="#16a34a"/>
    <text x="455" y="230" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">OllamaChatModel</text>
    <text x="455" y="258" text-anchor="middle" font-size="16" fill="#0f172a">Spring AI adapter</text>
    <rect x="640" y="190" width="180" height="100" rx="16" fill="#fef3c7" stroke="#d97706"/>
    <text x="730" y="230" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">Ollama</text>
    <text x="730" y="258" text-anchor="middle" font-size="16" fill="#0f172a">localhost:11434</text>
    <rect x="900" y="190" width="160" height="100" rx="16" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="980" y="230" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">Model</text>
    <text x="980" y="258" text-anchor="middle" font-size="16" fill="#0f172a">llama3.2:3b</text>
    <line x1="270" y1="240" x2="348" y2="240" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="560" y1="240" x2="638" y2="240" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="820" y1="240" x2="898" y2="240" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="560" y="370" text-anchor="middle" font-size="18" fill="#475569">On 8 GB RAM, prefer small models for learning and quick iteration.</text>
  </g>
</svg>
