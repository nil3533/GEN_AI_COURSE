<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Chat options at runtime</title>
  <desc id="desc">Default model options come from application.yml, while per-request options override them for specific use cases.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1120" height="500" rx="22" fill="#ffffff"/>
  <text x="60" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">Chat Options Control Runtime Behavior</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="90" y="156" width="260" height="116" rx="16" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="220" y="198" text-anchor="middle" font-size="20" font-weight="700" fill="#075985">application.yml</text>
    <text x="220" y="228" text-anchor="middle" font-size="16" fill="#0f172a">default model</text>
    <text x="220" y="252" text-anchor="middle" font-size="16" fill="#0f172a">temperature, max tokens</text>
    <rect x="90" y="326" width="260" height="116" rx="16" fill="#dcfce7" stroke="#16a34a"/>
    <text x="220" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">Per request</text>
    <text x="220" y="398" text-anchor="middle" font-size="16" fill="#0f172a">override for this call</text>
    <text x="220" y="422" text-anchor="middle" font-size="16" fill="#0f172a">summarize vs brainstorm</text>
    <rect x="510" y="226" width="250" height="116" rx="16" fill="#fef3c7" stroke="#d97706"/>
    <text x="635" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">ChatClient call</text>
    <text x="635" y="298" text-anchor="middle" font-size="16" fill="#0f172a">messages + options</text>
    <rect x="860" y="226" width="190" height="116" rx="16" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="955" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">Provider</text>
    <text x="955" y="298" text-anchor="middle" font-size="16" fill="#0f172a">model-specific limits</text>
    <line x1="350" y1="214" x2="508" y2="270" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="350" y1="384" x2="508" y2="300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="760" y1="284" x2="858" y2="284" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
