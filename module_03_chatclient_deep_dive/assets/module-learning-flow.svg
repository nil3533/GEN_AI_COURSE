<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Module 3 learning flow</title>
  <desc id="desc">Module 3 starts with prompt anatomy, moves through templates and prompting patterns, then builds streaming, history, options, and long-output handling.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 16px Segoe UI, Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .box2 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .box3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .h { font: 700 18px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .t { font: 500 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="520"/>
  <text x="56" y="70" class="title">Module 3: ChatClient Deep Dive</text>
  <text x="58" y="102" class="sub">Prompts, streaming responses, short conversation history, and runtime options.</text>

  <rect x="58" y="152" width="225" height="92" class="box"/>
  <text x="82" y="188" class="h">Prompt Anatomy</text>
  <text x="82" y="214" class="t">System, user, assistant</text>
  <text x="82" y="234" class="t">Ordering and intent</text>

  <path d="M285 198 H350" class="arrow"/>

  <rect x="360" y="152" width="225" height="92" class="box"/>
  <text x="384" y="188" class="h">Templates</text>
  <text x="384" y="214" class="t">Persona, date, variables</text>
  <text x="384" y="234" class="t">Escaping and safety</text>

  <path d="M587 198 H652" class="arrow"/>

  <rect x="662" y="152" width="225" height="92" class="box"/>
  <text x="686" y="188" class="h">Prompt Patterns</text>
  <text x="686" y="214" class="t">Zero-shot and few-shot</text>
  <text x="686" y="234" class="t">Role prompting</text>

  <path d="M775 246 V302" class="arrow"/>

  <rect x="662" y="312" width="225" height="92" class="box2"/>
  <text x="686" y="348" class="h">SSE Streaming</text>
  <text x="686" y="374" class="t">Flux tokens to browser</text>
  <text x="686" y="394" class="t">Handle disconnects</text>

  <path d="M660 358 H595" class="arrow"/>

  <rect x="360" y="312" width="225" height="92" class="box2"/>
  <text x="384" y="348" class="h">Short History</text>
  <text x="384" y="374" class="t">ConcurrentHashMap</text>
  <text x="384" y="394" class="t">Manual message replay</text>

  <path d="M358 358 H293" class="arrow"/>

  <rect x="58" y="312" width="225" height="92" class="box3"/>
  <text x="82" y="348" class="h">Runtime Options</text>
  <text x="82" y="374" class="t">Temperature and limits</text>
  <text x="82" y="394" class="t">Continuation strategy</text>

  <rect x="930" y="208" width="132" height="140" class="box3"/>
  <text x="956" y="248" class="h">Mini</text>
  <text x="950" y="274" class="h">Project</text>
  <text x="954" y="306" class="t">Streaming chat</text>
  <text x="954" y="326" class="t">REST API</text>
  <path d="M888 198 C930 202 938 218 938 244" class="arrow"/>
  <path d="M888 358 C930 354 938 338 938 318" class="arrow"/>
