<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="300" viewBox="0 0 1180 300" role="img" aria-labelledby="title desc">
  <title id="title">Transformer pipeline</title>
  <desc id="desc">Input text is tokenized, converted to vectors, processed by self-attention and feed-forward layers, and used to predict the next token.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .h { font: 700 15px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .t { font: 400 12px Segoe UI, Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1180" height="300" fill="#f8fafc"/>
  <text x="45" y="48" class="title">Transformer Big Picture</text>
  <g transform="translate(40,110)">
    <rect width="135" height="75" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="67" y="32" text-anchor="middle" class="h">Input text</text>
    <text x="67" y="54" text-anchor="middle" class="t">sentence or prompt</text>
  </g>
  <g transform="translate(205,110)">
    <rect width="135" height="75" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="67" y="32" text-anchor="middle" class="h">Tokens</text>
    <text x="67" y="54" text-anchor="middle" class="t">text pieces</text>
  </g>
  <g transform="translate(370,110)">
    <rect width="135" height="75" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="67" y="32" text-anchor="middle" class="h">Vectors</text>
    <text x="67" y="54" text-anchor="middle" class="t">numeric meaning</text>
  </g>
  <g transform="translate(535,110)">
    <rect width="150" height="75" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="75" y="32" text-anchor="middle" class="h">Self-attention</text>
    <text x="75" y="54" text-anchor="middle" class="t">connect tokens</text>
  </g>
  <g transform="translate(715,110)">
    <rect width="150" height="75" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="75" y="32" text-anchor="middle" class="h">Feed-forward</text>
    <text x="75" y="54" text-anchor="middle" class="t">refine meaning</text>
  </g>
  <g transform="translate(895,110)">
    <rect width="105" height="75" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="52" y="32" text-anchor="middle" class="h">Repeat</text>
    <text x="52" y="54" text-anchor="middle" class="t">many layers</text>
  </g>
  <g transform="translate(1030,110)">
    <rect width="115" height="75" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="57" y="32" text-anchor="middle" class="h">Next token</text>
    <text x="57" y="54" text-anchor="middle" class="t">prediction</text>
  </g>
  <path d="M175 147 L205 147" class="line"/><path d="M340 147 L370 147" class="line"/><path d="M505 147 L535 147" class="line"/>
  <path d="M685 147 L715 147" class="line"/><path d="M865 147 L895 147" class="line"/><path d="M1000 147 L1030 147" class="line"/>
</svg>

