<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="410" viewBox="0 0 1120 410" role="img" aria-labelledby="title desc">
  <title id="title">Context request flow</title>
  <desc id="desc">A user question is tokenized, optionally embedded, used to retrieve chunks, packed into a prompt, checked against token budget, and sent to the LLM.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
  <style>.title{font:700 28px Segoe UI,Arial;fill:#0f172a}.h{font:700 14px Segoe UI,Arial;fill:#0f172a}.t{font:400 12px Segoe UI,Arial;fill:#334155}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="410" fill="#f8fafc"/><text x="45" y="50" class="title">From Question to LLM Answer</text>
  <g transform="translate(50,125)"><rect width="130" height="68" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="65" y="28" text-anchor="middle" class="h">Question</text><text x="65" y="50" text-anchor="middle" class="t">user input</text></g>
  <g transform="translate(215,125)"><rect width="130" height="68" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="65" y="28" text-anchor="middle" class="h">Tokenize</text><text x="65" y="50" text-anchor="middle" class="t">count size</text></g>
  <g transform="translate(380,125)"><rect width="130" height="68" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="65" y="28" text-anchor="middle" class="h">Embed</text><text x="65" y="50" text-anchor="middle" class="t">optional</text></g>
  <g transform="translate(545,125)"><rect width="150" height="68" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="75" y="28" text-anchor="middle" class="h">Retrieve chunks</text><text x="75" y="50" text-anchor="middle" class="t">similar context</text></g>
  <g transform="translate(730,125)"><rect width="140" height="68" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="70" y="28" text-anchor="middle" class="h">Build prompt</text><text x="70" y="50" text-anchor="middle" class="t">question + context</text></g>
  <g transform="translate(905,125)"><rect width="150" height="68" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="75" y="28" text-anchor="middle" class="h">Check budget</text><text x="75" y="50" text-anchor="middle" class="t">fit context window</text></g>
  <rect x="455" y="285" width="210" height="62" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="560" y="312" text-anchor="middle" class="h">Send to LLM</text><text x="560" y="334" text-anchor="middle" class="t">return answer</text>
  <path d="M180 159 L215 159" class="line"/><path d="M345 159 L380 159" class="line"/><path d="M510 159 L545 159" class="line"/><path d="M695 159 L730 159" class="line"/><path d="M870 159 L905 159" class="line"/><path d="M980 193 C930 265 760 316 665 316" class="line"/>
</svg>

