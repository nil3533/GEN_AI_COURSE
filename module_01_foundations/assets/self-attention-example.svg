<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">Self-attention example</title>
  <desc id="desc">The token it attends strongly to laptop and weakly to less relevant words in the sentence.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
  <style>.title{font:700 28px Segoe UI,Arial;fill:#0f172a}.h{font:700 16px Segoe UI,Arial;fill:#0f172a}.t{font:400 13px Segoe UI,Arial;fill:#334155}.strong{stroke:#16a34a;stroke-width:5;fill:none;marker-end:url(#arrow)}.weak{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 6;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="960" height="340" fill="#f8fafc"/><text x="45" y="50" class="title">Self-Attention: What Does "it" Refer To?</text>
  <text x="50" y="92" class="t">Sentence: The customer dropped the laptop because it was overheating.</text>
  <rect x="110" y="175" width="140" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="180" y="214" text-anchor="middle" class="h">customer</text>
  <rect x="370" y="80" width="140" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="440" y="119" text-anchor="middle" class="h">laptop</text>
  <rect x="370" y="230" width="140" height="64" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="440" y="269" text-anchor="middle" class="h">dropped</text>
  <rect x="680" y="155" width="110" height="76" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="735" y="199" text-anchor="middle" class="h">it</text>
  <path d="M680 185 C610 140 565 115 510 112" class="strong"/><text x="570" y="118" class="h" fill="#166534">strong attention</text>
  <path d="M680 197 C560 205 390 210 250 205" class="weak"/><text x="330" y="203" class="t">weak attention</text>
  <path d="M680 212 C590 260 540 270 510 264" class="weak"/>
  <rect x="610" y="270" width="260" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="740" y="298" text-anchor="middle" class="t">Meaning: the laptop was overheating</text>
</svg>

