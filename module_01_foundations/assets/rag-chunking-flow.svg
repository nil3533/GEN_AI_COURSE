<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">RAG chunking flow</title>
  <desc id="desc">Documents are split into chunks, embedded, stored with metadata, and retrieved for a user question before the LLM answers.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
  <style>.title{font:700 28px Segoe UI,Arial;fill:#0f172a}.h{font:700 15px Segoe UI,Arial;fill:#0f172a}.t{font:400 12px Segoe UI,Arial;fill:#334155}.line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="500" fill="#f8fafc"/><text x="45" y="50" class="title">RAG: Controlled Context Selection</text>
  <rect x="70" y="115" width="160" height="65" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="150" y="143" text-anchor="middle" class="h">Large document</text><text x="150" y="165" text-anchor="middle" class="t">PDF, docs, code</text>
  <rect x="300" y="115" width="160" height="65" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="380" y="143" text-anchor="middle" class="h">Split chunks</text><text x="380" y="165" text-anchor="middle" class="t">paragraphs/sections</text>
  <rect x="530" y="115" width="170" height="65" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="615" y="143" text-anchor="middle" class="h">Embed chunks</text><text x="615" y="165" text-anchor="middle" class="t">vector per chunk</text>
  <rect x="770" y="115" width="190" height="65" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="865" y="143" text-anchor="middle" class="h">Store vectors</text><text x="865" y="165" text-anchor="middle" class="t">text + metadata</text>
  <rect x="165" y="310" width="170" height="65" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="250" y="338" text-anchor="middle" class="h">User question</text><text x="250" y="360" text-anchor="middle" class="t">embed query</text>
  <rect x="430" y="310" width="180" height="65" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="520" y="338" text-anchor="middle" class="h">Find top chunks</text><text x="520" y="360" text-anchor="middle" class="t">semantic search</text>
  <rect x="705" y="310" width="190" height="65" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="800" y="338" text-anchor="middle" class="h">LLM answers</text><text x="800" y="360" text-anchor="middle" class="t">with selected context</text>
  <path d="M230 148 L300 148" class="line"/><path d="M460 148 L530 148" class="line"/><path d="M700 148 L770 148" class="line"/><path d="M335 343 L430 343" class="line"/><path d="M610 343 L705 343" class="line"/><path d="M865 180 C820 260 660 320 610 338" class="line"/>
</svg>

