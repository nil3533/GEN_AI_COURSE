<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Safe LLM application flow</title>
  <desc id="desc">A safe application authenticates, authorizes, redacts data, builds a prompt, calls the model, validates the response, returns the answer, and logs metrics.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker><style>.title{font:700 28px Segoe UI,Arial;fill:#0f172a}.h{font:700 13px Segoe UI,Arial;fill:#0f172a}.t{font:400 11px Segoe UI,Arial;fill:#334155}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="360" fill="#f8fafc"/><text x="45" y="50" class="title">Safe LLM Application Flow</text>
  <g transform="translate(35,130)"><rect width="115" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Request</text><text x="57" y="47" text-anchor="middle" class="t">arrives</text></g>
  <g transform="translate(175,130)"><rect width="115" height="62" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Authenticate</text><text x="57" y="47" text-anchor="middle" class="t">who are you?</text></g>
  <g transform="translate(315,130)"><rect width="115" height="62" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Authorize</text><text x="57" y="47" text-anchor="middle" class="t">can you act?</text></g>
  <g transform="translate(455,130)"><rect width="115" height="62" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Redact</text><text x="57" y="47" text-anchor="middle" class="t">remove secrets</text></g>
  <g transform="translate(595,130)"><rect width="115" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Prompt</text><text x="57" y="47" text-anchor="middle" class="t">build context</text></g>
  <g transform="translate(735,130)"><rect width="115" height="62" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Model call</text><text x="57" y="47" text-anchor="middle" class="t">provider API</text></g>
  <g transform="translate(875,130)"><rect width="115" height="62" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/><text x="57" y="28" text-anchor="middle" class="h">Validate</text><text x="57" y="47" text-anchor="middle" class="t">check output</text></g>
  <g transform="translate(560,255)"><rect width="160" height="54" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="80" y="32" text-anchor="middle" class="h">Return and log</text></g>
  <path d="M150 161 L175 161" class="line"/><path d="M290 161 L315 161" class="line"/><path d="M430 161 L455 161" class="line"/><path d="M570 161 L595 161" class="line"/><path d="M710 161 L735 161" class="line"/><path d="M850 161 L875 161" class="line"/><path d="M932 192 C870 250 780 282 720 282" class="line"/>
</svg>

