<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" role="img" aria-labelledby="title desc">
  <title id="title">One transformer layer</title>
  <desc id="desc">A transformer layer takes token vectors, applies self-attention, mixes useful information, applies a feed-forward network, and outputs refined vectors.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
  <style>.title{font:700 28px Segoe UI,Arial;fill:#0f172a}.h{font:700 16px Segoe UI,Arial;fill:#0f172a}.t{font:400 13px Segoe UI,Arial;fill:#334155}.line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="980" height="330" fill="#f8fafc"/><text x="45" y="50" class="title">Inside One Transformer Layer</text>
  <rect x="55" y="130" width="150" height="76" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="130" y="160" text-anchor="middle" class="h">Token vectors</text><text x="130" y="184" text-anchor="middle" class="t">current meaning</text>
  <rect x="265" y="130" width="150" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="340" y="160" text-anchor="middle" class="h">Self-attention</text><text x="340" y="184" text-anchor="middle" class="t">find related tokens</text>
  <rect x="475" y="130" width="150" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="550" y="160" text-anchor="middle" class="h">Mix context</text><text x="550" y="184" text-anchor="middle" class="t">copy useful signal</text>
  <rect x="685" y="130" width="150" height="76" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="760" y="160" text-anchor="middle" class="h">Feed-forward</text><text x="760" y="184" text-anchor="middle" class="t">refine each token</text>
  <rect x="395" y="250" width="190" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="490" y="282" text-anchor="middle" class="h">Output to next layer</text>
  <path d="M205 168 L265 168" class="line"/><path d="M415 168 L475 168" class="line"/><path d="M625 168 L685 168" class="line"/><path d="M760 206 C720 250 645 276 585 276" class="line"/>
</svg>

