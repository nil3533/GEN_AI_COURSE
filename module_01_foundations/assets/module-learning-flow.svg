<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Module 1 learning flow</title>
  <desc id="desc">A flow from AI foundations through transformers, model lifecycle, tokens, safety, Java API calls, and the Spring Boot mini-project.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="24" fill="#f8fafc"/>
  <rect x="34" y="34" width="1132" height="452" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="70" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Module 1: Foundations to First LLM Call</text>
  <text x="70" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Read the concepts in order, then build the raw RestClient mini-project before Spring AI abstractions.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="178" width="168" height="96" rx="16" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="156" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#075985">01</text>
    <text x="156" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">AI - ML - DL</text>

    <rect x="290" y="178" width="168" height="96" rx="16" fill="#dcfce7" stroke="#16a34a"/>
    <text x="374" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">02</text>
    <text x="374" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">Transformers</text>

    <rect x="508" y="178" width="168" height="96" rx="16" fill="#fef3c7" stroke="#d97706"/>
    <text x="592" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">03</text>
    <text x="592" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">Model lifecycle</text>

    <rect x="726" y="178" width="168" height="96" rx="16" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="810" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#5b21b6">04</text>
    <text x="810" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">Tokens + RAG</text>

    <rect x="944" y="178" width="168" height="96" rx="16" fill="#ffe4e6" stroke="#e11d48"/>
    <text x="1028" y="216" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#9f1239">05</text>
    <text x="1028" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">Safety</text>

    <rect x="314" y="354" width="238" height="92" rx="16" fill="#f1f5f9" stroke="#64748b"/>
    <text x="433" y="392" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">06</text>
    <text x="433" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">Call an LLM from Java</text>

    <rect x="648" y="354" width="238" height="92" rx="16" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="767" y="392" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#115e59">Mini-project</text>
    <text x="767" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0f172a">Spring Boot + Groq</text>
  </g>

  <line x1="240" y1="226" x2="288" y2="226" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="458" y1="226" x2="506" y2="226" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="676" y1="226" x2="724" y2="226" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="894" y1="226" x2="942" y2="226" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 1028 274 C 1028 322 433 306 433 350" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="552" y1="400" x2="646" y2="400" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
