<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380" role="img" aria-labelledby="title desc">
  <title id="title">Request Validation Flow</title>
  <desc id="desc">Postman JSON reaches AskController and either fails validation or calls LlmService.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 14px Segoe UI, Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1000" height="380" fill="#f8fafc"/>
  <text x="50" y="52" class="title">Client to Controller Validation</text>

  <rect x="65" y="140" width="170" height="86" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="172" text-anchor="middle" class="label">Postman JSON</text>
  <text x="150" y="197" text-anchor="middle" class="text">question field</text>

  <rect x="310" y="140" width="185" height="86" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="402" y="172" text-anchor="middle" class="label">AskController</text>
  <text x="402" y="197" text-anchor="middle" class="text">@Valid @RequestBody</text>

  <path d="M 235 183 L 310 183" class="line"/>

  <polygon points="610,125 725,183 610,242 495,183" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="610" y="178" text-anchor="middle" class="label">Valid?</text>
  <text x="610" y="201" text-anchor="middle" class="text">not blank, max 4000</text>

  <rect x="780" y="95" width="160" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="860" y="124" text-anchor="middle" class="label">No</text>
  <text x="860" y="147" text-anchor="middle" class="text">400 error JSON</text>

  <rect x="780" y="220" width="160" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="860" y="249" text-anchor="middle" class="label">Yes</text>
  <text x="860" y="272" text-anchor="middle" class="text">call LlmService</text>

  <path d="M 725 170 L 780 132" class="line"/>
  <path d="M 725 198 L 780 252" class="line"/>
</svg>
