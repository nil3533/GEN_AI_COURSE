<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Error Handling Flow</title>
  <desc id="desc">LlmService exceptions are mapped by GlobalExceptionHandler into JSON error responses.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 16px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1120" height="560" fill="#f8fafc"/>
  <text x="55" y="52" class="title">Error Handling Map</text>

  <rect x="450" y="95" width="220" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="560" y="123" text-anchor="middle" class="label">LlmService</text>
  <text x="560" y="146" text-anchor="middle" class="text">provider call or validation fails</text>

  <rect x="70" y="235" width="160" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="150" y="263" text-anchor="middle" class="label">Missing key</text>
  <text x="150" y="286" text-anchor="middle" class="text">500 setup message</text>

  <rect x="270" y="235" width="160" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="350" y="263" text-anchor="middle" class="label">401 invalid key</text>
  <text x="350" y="286" text-anchor="middle" class="text">500 invalid key</text>

  <rect x="470" y="235" width="160" height="70" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="550" y="263" text-anchor="middle" class="label">429 rate limit</text>
  <text x="550" y="286" text-anchor="middle" class="text">429 retry later</text>

  <rect x="670" y="235" width="160" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="750" y="263" text-anchor="middle" class="label">5xx provider</text>
  <text x="750" y="286" text-anchor="middle" class="text">502 unavailable</text>

  <rect x="870" y="235" width="170" height="70" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="955" y="263" text-anchor="middle" class="label">Timeout</text>
  <text x="955" y="286" text-anchor="middle" class="text">502 connection error</text>

  <rect x="420" y="410" width="280" height="75" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="560" y="440" text-anchor="middle" class="label">GlobalExceptionHandler</text>
  <text x="560" y="464" text-anchor="middle" class="text">returns consistent JSON error response</text>

  <path d="M 560 165 L 150 235" class="line"/>
  <path d="M 560 165 L 350 235" class="line"/>
  <path d="M 560 165 L 550 235" class="line"/>
  <path d="M 560 165 L 750 235" class="line"/>
  <path d="M 560 165 L 955 235" class="line"/>
  <path d="M 150 305 L 490 410" class="line"/>
  <path d="M 350 305 L 520 410" class="line"/>
  <path d="M 550 305 L 560 410" class="line"/>
  <path d="M 750 305 L 610 410" class="line"/>
  <path d="M 955 305 L 645 410" class="line"/>
</svg>

