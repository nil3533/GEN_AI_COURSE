<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="420" viewBox="0 0 1050 420" role="img" aria-labelledby="title desc">
  <title id="title">Mocked Testing Flow</title>
  <desc id="desc">LlmServiceTest uses MockRestServiceServer to test parsing without calling the live Groq API.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 14px Segoe UI, Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1050" height="420" fill="#f8fafc"/>
  <text x="55" y="52" class="title">Testing Without Calling Live Groq</text>

  <rect x="55" y="155" width="185" height="85" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="147" y="188" text-anchor="middle" class="label">LlmServiceTest</text>
  <text x="147" y="212" text-anchor="middle" class="text">JUnit test</text>

  <rect x="315" y="155" width="215" height="85" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="422" y="188" text-anchor="middle" class="label">MockRestServiceServer</text>
  <text x="422" y="212" text-anchor="middle" class="text">fake HTTP server</text>

  <rect x="605" y="155" width="170" height="85" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="690" y="188" text-anchor="middle" class="label">Fake Groq JSON</text>
  <text x="690" y="212" text-anchor="middle" class="text">choices + usage</text>

  <rect x="850" y="155" width="160" height="85" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="930" y="188" text-anchor="middle" class="label">Assertions</text>
  <text x="930" y="212" text-anchor="middle" class="text">answer and tokens</text>

  <path d="M 240 198 L 315 198" class="line"/>
  <path d="M 530 198 L 605 198" class="line"/>
  <path d="M 775 198 L 850 198" class="line"/>

  <rect x="170" y="310" width="710" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="525" y="336" text-anchor="middle" class="label">Why this matters</text>
  <text x="525" y="360" text-anchor="middle" class="text">Tests stay fast, deterministic, free, and independent of provider uptime.</text>
</svg>

