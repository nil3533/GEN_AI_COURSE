<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Spring AI GenAI Journey social preview</title>
  <desc id="desc">Social preview artwork for a Java and Spring Boot first GenAI course repository.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #f8fafc; rx: 24; }
      .green { fill: #22c55e; }
      .cyan { fill: #06b6d4; }
      .orange { fill: #f97316; }
      .title { font: 800 62px Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 500 28px Segoe UI, Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 700 24px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .tiny { font: 500 18px Segoe UI, Arial, sans-serif; fill: #334155; }
      .tag { font: 700 20px Segoe UI, Arial, sans-serif; fill: #f8fafc; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="640"/>
  <circle cx="1080" cy="110" r="90" class="green" opacity="0.22"/>
  <circle cx="1120" cy="500" r="130" class="cyan" opacity="0.18"/>
  <circle cx="180" cy="520" r="120" class="orange" opacity="0.16"/>

  <text x="72" y="150" class="title">Spring AI GenAI Journey</text>
  <text x="76" y="206" class="sub">Java and Spring Boot-first GenAI course with runnable projects</text>

  <rect x="78" y="286" width="230" height="116" class="panel"/>
  <text x="106" y="328" class="small">ChatClient</text>
  <text x="106" y="362" class="tiny">provider switching</text>
  <text x="106" y="388" class="tiny">Groq + Ollama</text>

  <rect x="342" y="286" width="230" height="116" class="panel"/>
  <text x="370" y="328" class="small">Streaming</text>
  <text x="370" y="362" class="tiny">SSE chat APIs</text>
  <text x="370" y="388" class="tiny">manual history</text>

  <rect x="606" y="286" width="230" height="116" class="panel"/>
  <text x="634" y="328" class="small">Tool Calling</text>
  <text x="634" y="362" class="tiny">Java @Tool methods</text>
  <text x="634" y="388" class="tiny">typed responses</text>

  <rect x="870" y="286" width="230" height="116" class="panel"/>
  <text x="898" y="328" class="small">RAG Next</text>
  <text x="898" y="362" class="tiny">PostgreSQL</text>
  <text x="898" y="388" class="tiny">pgvector</text>

  <rect x="78" y="470" width="164" height="42" rx="21" class="green"/>
  <text x="110" y="499" class="tag">Java 21</text>

  <rect x="266" y="470" width="218" height="42" rx="21" class="cyan"/>
  <text x="302" y="499" class="tag">Spring Boot</text>

  <rect x="508" y="470" width="178" height="42" rx="21" class="orange"/>
  <text x="544" y="499" class="tag">Spring AI</text>

  <text x="78" y="570" class="sub">No Python required. Production habits from Module 1.</text>
</svg>
