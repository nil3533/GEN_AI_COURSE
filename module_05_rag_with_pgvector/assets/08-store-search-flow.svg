<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-labelledby="title desc">
  <title id="title">Store and search flow</title>
  <desc id="desc">Ingestion writes vector rows while question answering embeds the question and retrieves top-k chunks.</desc>
  <rect width="960" height="400" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">RAG has two separate paths</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="15" fill="#475569">Ingestion prepares the index. Question answering reads from that index.</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <text x="90" y="128" font-size="18" font-weight="700" fill="#0f172a">Ingestion path</text>
    <rect x="90" y="150" width="140" height="64" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="160" y="188" text-anchor="middle" font-weight="700" fill="#1e3a8a">Document</text>
    <path d="M240 182 H302" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="315" y="150" width="140" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="385" y="188" text-anchor="middle" font-weight="700" fill="#14532d">Chunks</text>
    <path d="M465 182 H527" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="540" y="150" width="140" height="64" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="610" y="188" text-anchor="middle" font-weight="700" fill="#78350f">Embeddings</text>
    <path d="M690 182 H752" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="765" y="150" width="120" height="64" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="825" y="188" text-anchor="middle" font-weight="700" fill="#701a75">Vector rows</text>
    <text x="90" y="270" font-size="18" font-weight="700" fill="#0f172a">Question path</text>
    <rect x="90" y="292" width="140" height="64" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="160" y="330" text-anchor="middle" font-weight="700" fill="#075985">Question</text>
    <path d="M240 324 H302" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="315" y="292" width="140" height="64" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="385" y="330" text-anchor="middle" font-weight="700" fill="#78350f">Query vector</text>
    <path d="M465 324 H527" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="540" y="292" width="140" height="64" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="610" y="330" text-anchor="middle" font-weight="700" fill="#701a75">Top-k chunks</text>
    <path d="M690 324 H752" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="765" y="292" width="120" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="825" y="330" text-anchor="middle" font-weight="700" fill="#14532d">Answer</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
