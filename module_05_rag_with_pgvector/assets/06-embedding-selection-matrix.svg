<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-labelledby="title desc">
  <title id="title">Embedding selection matrix</title>
  <desc id="desc">Embedding model choice depends on cost, privacy, quality, speed, and vector dimensions.</desc>
  <rect width="960" height="400" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Pick embeddings like infrastructure, not like a prompt trick</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="15" fill="#475569">The model creates the search space. Changing it means re-embedding documents.</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="70" y="126" width="820" height="210" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="70" y="126" width="820" height="40" rx="8" fill="#0f172a"/>
    <text x="112" y="152" font-weight="700" fill="#ffffff">Option</text>
    <text x="280" y="152" font-weight="700" fill="#ffffff">Best for</text>
    <text x="492" y="152" font-weight="700" fill="#ffffff">Tradeoff</text>
    <text x="704" y="152" font-weight="700" fill="#ffffff">Dimension rule</text>
    <g fill="#334155">
      <text x="112" y="198">Ollama local</text>
      <text x="280" y="198">learning, privacy</text>
      <text x="492" y="198">hardware dependent</text>
      <text x="704" y="198">match vector(N)</text>
      <line x1="90" y1="216" x2="870" y2="216" stroke="#e2e8f0"/>
      <text x="112" y="248">Hosted API</text>
      <text x="280" y="248">quality, scale</text>
      <text x="492" y="248">cost and data flow</text>
      <text x="704" y="248">fixed by provider</text>
      <line x1="90" y1="266" x2="870" y2="266" stroke="#e2e8f0"/>
      <text x="112" y="298">Hash test vector</text>
      <text x="280" y="298">offline tests</text>
      <text x="492" y="298">not semantic enough</text>
      <text x="704" y="298">configurable</text>
    </g>
  </g>
</svg>
