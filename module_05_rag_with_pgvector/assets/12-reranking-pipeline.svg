<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Reranking pipeline</title>
  <desc id="desc">First-stage retrieval gets many candidate chunks; a reranker scores them more carefully and keeps the best few.</desc>
  <rect width="960" height="380" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Reranking improves quality after fast retrieval</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="15" fill="#475569">The first stage is broad and fast. The reranker is slower but more precise.</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="80" y="152" width="150" height="74" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="155" y="184" font-weight="700" text-anchor="middle" fill="#1e3a8a">Question</text>
    <text x="155" y="206" text-anchor="middle" fill="#1e40af">user intent</text>
    <path d="M240 189 H304" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="318" y="152" width="160" height="74" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="398" y="184" font-weight="700" text-anchor="middle" fill="#14532d">Retrieve top 30</text>
    <text x="398" y="206" text-anchor="middle" fill="#166534">fast candidates</text>
    <path d="M488 189 H552" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="566" y="152" width="160" height="74" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="646" y="184" font-weight="700" text-anchor="middle" fill="#78350f">Rerank</text>
    <text x="646" y="206" text-anchor="middle" fill="#92400e">score pairs</text>
    <path d="M736 189 H800" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="814" y="152" width="100" height="74" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="864" y="184" font-weight="700" text-anchor="middle" fill="#701a75">Keep 5</text>
    <text x="864" y="206" text-anchor="middle" fill="#86198f">answer</text>
    <rect x="250" y="282" width="460" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="480" y="308" font-size="13" font-weight="700" text-anchor="middle" fill="#0f172a">Best use: when recall is good but the top order is weak.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
