<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-labelledby="title desc">
  <title id="title">RAG evaluation loop</title>
  <desc id="desc">Evaluation starts with question sets, expected sources, retrieval metrics, answer checks, and iteration.</desc>
  <rect width="960" height="400" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">RAG quality improves through measurement, not demos</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="15" fill="#475569">Track retrieval before judging generation. If the right chunks are missing, the answer cannot be reliable.</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="80" y="145" width="150" height="74" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="155" y="177" font-weight="700" text-anchor="middle" fill="#1e3a8a">Eval cases</text>
    <text x="155" y="199" text-anchor="middle" fill="#1e40af">question + source</text>
    <path d="M240 182 H310" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="324" y="145" width="150" height="74" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="399" y="177" font-weight="700" text-anchor="middle" fill="#14532d">Retrieve</text>
    <text x="399" y="199" text-anchor="middle" fill="#166534">top-k chunks</text>
    <path d="M484 182 H554" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="568" y="145" width="150" height="74" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="643" y="177" font-weight="700" text-anchor="middle" fill="#78350f">Measure</text>
    <text x="643" y="199" text-anchor="middle" fill="#92400e">recall + MRR</text>
    <path d="M728 182 H798" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="812" y="145" width="90" height="74" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="857" y="177" font-weight="700" text-anchor="middle" fill="#701a75">Iterate</text>
    <text x="857" y="199" text-anchor="middle" fill="#86198f">improve</text>
    <path d="M857 229 C857 304 155 304 155 231" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="250" y="315" width="460" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="480" y="341" font-size="13" font-weight="700" text-anchor="middle" fill="#0f172a">Measure after every chunking, embedding, prompt, or index change.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
