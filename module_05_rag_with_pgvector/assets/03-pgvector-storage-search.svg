<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">pgvector storage and search</title>
  <desc id="desc">Document chunks become rows in PostgreSQL with metadata, content, and vector embeddings; queries order by distance.</desc>
  <rect width="960" height="390" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">pgvector stores chunks beside their meaning</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="15" fill="#475569">Metadata keeps answers inspectable. The vector column makes similarity search possible inside PostgreSQL.</text>
  <g font-family="Arial, sans-serif">
    <rect x="55" y="124" width="540" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="55" y="124" width="540" height="38" rx="8" fill="#0f172a"/>
    <text x="76" y="149" font-size="15" font-weight="700" fill="#ffffff">rag_chunks</text>
    <g font-size="13" fill="#334155">
      <text x="76" y="190">id</text>
      <text x="200" y="190">document_id</text>
      <text x="340" y="190">chunk_index</text>
      <text x="470" y="190">embedding</text>
      <line x1="70" y1="202" x2="580" y2="202" stroke="#e2e8f0"/>
      <text x="76" y="228">spring-0</text>
      <text x="200" y="228">spring-ai-notes</text>
      <text x="340" y="228">0</text>
      <text x="470" y="228">[0.12, ...]</text>
      <text x="76" y="260">pgvector-0</text>
      <text x="200" y="260">pgvector-notes</text>
      <text x="340" y="260">0</text>
      <text x="470" y="260">[0.03, ...]</text>
      <text x="76" y="292">rag-0</text>
      <text x="200" y="292">rag-notes</text>
      <text x="340" y="292">0</text>
      <text x="470" y="292">[0.77, ...]</text>
    </g>
    <path d="M615 224 H694" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="708" y="146" width="200" height="156" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="808" y="180" font-size="17" font-weight="700" text-anchor="middle" fill="#14532d">Similarity query</text>
    <text x="808" y="210" font-size="13" text-anchor="middle" fill="#166534">order by distance</text>
    <text x="808" y="235" font-size="13" text-anchor="middle" fill="#166534">limit top-k rows</text>
    <text x="808" y="260" font-size="13" text-anchor="middle" fill="#166534">return metadata</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
