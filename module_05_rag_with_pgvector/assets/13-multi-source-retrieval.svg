<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-labelledby="title desc">
  <title id="title">Multi-source retrieval</title>
  <desc id="desc">Multiple source retrievers feed a policy-aware merge step before the answer prompt is built.</desc>
  <rect width="960" height="400" fill="#f8fafc"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Enterprise RAG usually retrieves from more than one place</text>
  <text x="48" y="80" font-family="Arial, sans-serif" font-size="15" fill="#475569">Merge results only after permissions and source rules have been applied.</text>
  <g font-family="Arial, sans-serif" font-size="14">
    <rect x="70" y="122" width="170" height="62" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="155" y="160" font-weight="700" text-anchor="middle" fill="#1e3a8a">Product docs</text>
    <rect x="70" y="206" width="170" height="62" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="155" y="244" font-weight="700" text-anchor="middle" fill="#14532d">Tickets</text>
    <rect x="70" y="290" width="170" height="62" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="155" y="328" font-weight="700" text-anchor="middle" fill="#78350f">Database rows</text>
    <path d="M250 153 H404" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M250 237 H404" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M250 321 H404" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="418" y="184" width="180" height="110" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
    <text x="508" y="220" font-weight="700" text-anchor="middle" fill="#701a75">Policy-aware</text>
    <text x="508" y="244" text-anchor="middle" fill="#86198f">merge and rank</text>
    <text x="508" y="268" text-anchor="middle" fill="#86198f">tenant + role checks</text>
    <path d="M608 239 H704" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="718" y="184" width="170" height="110" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <text x="803" y="220" font-weight="700" text-anchor="middle" fill="#164e63">Grounded prompt</text>
    <text x="803" y="244" text-anchor="middle" fill="#0e7490">source-tagged</text>
    <text x="803" y="268" text-anchor="middle" fill="#0e7490">citations</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
